# Dependabot configuration for aqua-sophia
# See: https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "dependabot"
    labels:
      - "dependencies"
      - "dependabot"
